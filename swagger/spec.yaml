openapi: 3.0.3
info:
  title: Order Management API - LinkFields Assessment
  description: API for managing customer orders as part of the Technical BA Assessment.
  version: 1.0.0
servers:
  - url: http://localhost:8080/api/v1
paths:
  /orders:
    post:
      summary: Create a new order
      tags: [Orders]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderInput'
      responses:
        '201':
          description: Order created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '400':
          description: Invalid input

    get:
      summary: Get list of orders
      tags: [Orders]
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Order'

  /orders/{orderId}/status:
    patch:
      summary: Update order status
      tags: [Orders]
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [Pending, Shipped, Delivered, Cancelled]
      responses:
        '200':
          description: Status updated successfully
        '404':
          description: Order not found

components:
  schemas:
    OrderInput:
      type: object
      required: [customerId, items]
      properties:
        customerId:
          type: integer
        items:
          type: array
          items:
            type: object
            properties:
              productId:
                type: integer
              quantity:
                type: integer

    Order:
      type: object
      properties:
        id:
          type: integer
        customerId:
          type: integer
        status:
          type: string
        totalAmount:
          type: number
          format: float
        createdAt:
          type: string
          format: date-time
